<div class="container">
  <div class="inicioS">
    <h2>Inicio de sesión</h2>

    <form #loginForm="ngForm" (ngSubmit)="iniciarSesion(loginForm)">
      <div class="campos">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" ngModel required />
      </div>

      <div class="campos">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" ngModel required />
      </div>

      <div class="recordar">
        <input type="checkbox" id="recordar" name="recordar" [(ngModel)]="recordarSesion" />
        <label for="recordar">Recordar sesión</label>
      </div>

      @if (mensajeError) { <!--Si las credenciales no son correctas salta un aviso-->
        <div class="credenciales">
          {{ mensajeError }}
        </div>
      }

      <button type="submit" [disabled]="loginForm.invalid">Iniciar sesión</button>
    </form>

    <br />
    <a routerLink="/recuperar">¿Has olvidado tu contraseña?</a>

    <br />
    <a routerLink="/registro">¿No tienes cuenta? Regístrate aquí</a>
  </div>
</div>
