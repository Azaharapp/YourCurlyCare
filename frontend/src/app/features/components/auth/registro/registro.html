<div class="container">
  <h2>Registrarse</h2>

  <form #registroForm="ngForm" (ngSubmit)="registrarse(registroForm)">
    <div class="campos">
      <label for="name">Nombre</label>
      <input type="text" id="name" name="name" ngModel required />
    </div>

    <div class="campos">
      <label for="surname">Apellidos</label>
      <input type="text" id="surname" name="surname" ngModel />
    </div>

    <div class="campos">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" ngModel required />
    </div>

    <div class="campos">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" ngModel required />
    </div>

    <div class="campos">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" ngModel required />
    </div>

    <button type="submit" [disabled]="registroForm.invalid">Registrarse</button>
  </form>

  <br />
  <a routerLink="/login">¿Ya tienes una cuenta? Inicia sesión aquí</a>
</div>
